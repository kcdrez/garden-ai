[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
    "migrations",
    "__pycache__",
    "venv"
]

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "F",  # pyflakes
    "I",  # import sorting
    "B"   # bugbear (common bugs)
]

[tool.black]
line-length = 100
target-version = ["py311"]